name: VisantaraEventHandler
version: '${project.version}'
main: me.bintanq.VisantaraEventHandler
api-version: '1.21'
description: High-performance dummy entity testing plugin for MythicMobs and MMOItems
authors: [ bintanq ]
website: ''

depend:
  - MythicMobs
  - MMOItems

softdepend:
  - MythicLib

commands:
  vhandler:
    description: Main command for VisantaraEventHandler
    usage: /vhandler <dummy|drop|reload>
    permission: visantara.use
    aliases:
      - vdummy
      - vh

permissions:
  visantara.use:
    description: Access to /vhandler command
    default: op
  visantara.dummy.spawn:
    description: Spawn dummy entities
    default: op
  visantara.dummy.remove:
    description: Remove dummy entities
    default: op
  visantara.drop.check:
    description: Check block natural/player-placed status
    default: op
  visantara.drop.mark:
    description: Manually mark blocks as player-placed or natural
    default: op
  visantara.damage.output:
    description: Receive damage analytics in chat
    default: op