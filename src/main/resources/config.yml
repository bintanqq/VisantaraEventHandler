# VisantaraEventHandler Configuration
# MiniMessage and legacy (&) color codes are both supported in nametags.

settings:
  remove-radius: 20
  broadcast-damage: false
  min-display-damage: 0.0

dummy:
  mob:
    nametag: "&e[MOB DUMMY] &c❤ <hp>/<maxhp>"
    mythic-mob-type: ""
    vanilla-type: ZOMBIE
    invincible: true
    max-hp: 1024.0
    disable-sounds: true

  player:
    nametag: "&b[PLAYER DUMMY] &c❤ <hp>/<maxhp>"
    invincible: true
    max-hp: 1024.0
    disable-sounds: true
    skin-uuid: "8667ba71b85a4004af54457a9734eed7"

analytics:
  format: "&8[&6VEH&8] &7{entity} &8| &c{damage} DMG &8| &eType: {type} &8| &dSkill: {skill} &8| &aEffects: {effects}"
  decimal-places: 2
  show-no-effects: true

# ─────────────────────────────────────────
#  Natural Block Drops
# ─────────────────────────────────────────
# Drops hanya terjadi pada block yang TIDAK diletakkan oleh pemain.
# Block tanpa data (legacy/sebelum plugin dipasang) dianggap NATURAL.
#
# Format amount: min-max (e.g. 1-3)
# Biomes: gunakan nama Bukkit Biome (https://jd.papermc.io/paper/1.21/)
#         kosongkan list untuk semua biome
# Weather: CLEAR, RAIN, THUNDER (optional, kosongkan untuk semua weather)
# Time: DAY, NIGHT (optional, kosongkan untuk semua waktu)
#
# Contoh item type MMOItems: MATERIAL, GEM, CONSUMABLE, dll
# Contoh item id: lihat konfigurasi MMOItems kamu
# ─────────────────────────────────────────
natural-drops:
  enabled: true

  place-ignore-list:
    - WHEAT
    - WHEAT_SEEDS
    - CARROT
    - POTATO
    - BEETROOT_SEEDS
    - NETHER_WART
    - COCOA_BEANS
    - SWEET_BERRIES
    - TORCHFLOWER_SEEDS
    - PITCHER_POD

  blocks:
    OAK_LEAVES:
      drops:
        - type: MATERIAL
          id: LEAF_STINGER
          chance: 0.08
          amount-min: 1
          amount-max: 1
